server:
  port: 8081

spring:
  datasource:
    # Si Railway inyecta la variable, la usa; si no, por defecto cae en tu Laragon (db_productos)
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/db_productos?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha  
  packages-to-scan: com.tiendapexfit.productos.controllers
  packagesToScan: com.tiendapexfit.productos.controllers

logging:
  level:
    root: DEBUG
    org.springdoc: DEBUG